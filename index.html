<script>
const params = new URLSearchParams(window.location.search);
const codigo = params.get("codigo");
const hash = params.get("hash");

function formatarData(dataRaw) {
  if (!dataRaw) return "-";
  const d = new Date(dataRaw);
  if (isNaN(d)) return dataRaw;

  const pad = (n) => n.toString().padStart(2, '0');

  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function hashCurto(hash) {
  if (!hash) return "-";
  return hash.substring(0, 10) + "...";
}

function getCampo(obj, nomes) {
  for (let nome of nomes) {
    if (obj[nome] !== undefined && obj[nome] !== null && obj[nome] !== "") {
      return obj[nome];
    }
  }
  return "-";
}

async function validar() {

  const statusDiv = document.getElementById("status");
  const dadosDiv = document.getElementById("dados");

  try {

    const res = await fetch(`/api/validar?codigo=${codigo}&hash=${hash}`);
    const data = await res.json();

    if (data.status === "valido") {

      statusDiv.innerHTML = "✔ Documento Autêntico";
      statusDiv.className = "status valido";

      const d = data.dados || {};

      // 🔥 CORREÇÃO REAL
      let tipo = (d.tipo || "").toLowerCase().trim();

      console.log("TIPO RECEBIDO:", tipo);
      console.log("OBJETO COMPLETO:", d);

      let html = "";

      // =========================
      // 📄 FISCALIZAÇÃO
      // =========================
      if (tipo === "fiscalizacao") {

        html = `
          <p><b>Fiscal do contrato:</b> ${getCampo(d, ["fiscalContrato","Nome"])}</p>
          <p><b>Matrícula:</b> ${getCampo(d, ["matricula","Matricula"])}</p>
          <p><b>Data/hora do atesto:</b> ${formatarData(getCampo(d, ["dataHoraAtesto","DataHoraAssinatura"]))}</p>
        `;
      }

      // =========================
      // 🚚 TRANSPORTE (inclui RESERVA)
      // =========================
      else if (tipo === "transporte" || tipo === "reserva") {

        html = `
          <p><b>Solicitante:</b> ${getCampo(d, ["Solicitante","Nome"])}</p>

          <p><b>Chefe do setor:</b> ${getCampo(d, ["ChefeNome"])}</p>
          <p><b>Matrícula:</b> ${getCampo(d, ["ChefeMatricula"])}</p>
          <p><b>Data/Hora aprovação:</b> ${formatarData(getCampo(d, ["ChefeDataHoraAprovacao"]))}</p>

          <hr>

          <p><b>Responsável transporte:</b> ${getCampo(d, ["RespTransporte"])}</p>
          <p><b>Matrícula:</b> ${getCampo(d, ["TransporteMatricula"])}</p>
          <p><b>Data/Hora aprovação:</b> ${formatarData(getCampo(d, ["TransporteDataAprova"]))}</p>
        `;
      }

      // =========================
      // 🧯 FALLBACK
      // =========================
      else {

        html = `
          <p><b>Documento identificado, porém sem layout específico.</b></p>
          <p><b>Tipo recebido:</b> ${tipo}</p>
        `;
      }

      dadosDiv.innerHTML = `
        ${html}

        <div class="selo">
          <strong>DOCUMENTO VALIDADO DIGITALMENTE</strong>

          Código verificador:
          <div class="codigo-box">${codigo}</div>

          Hash de segurança:
          <div class="codigo-box">${hashCurto(hash)}</div>
        </div>

        <div style="margin-top:20px;">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${window.location.href}" />
        </div>

        <div class="footer">
          Este documento foi validado eletronicamente e pode ser conferido a qualquer momento utilizando o código verificador.
        </div>
      `;

    } else {

      statusDiv.innerHTML = "❌ Documento inválido";
      statusDiv.className = "status invalido";

      dadosDiv.innerHTML = `<p>Documento não encontrado.</p>`;
    }

  } catch (err) {

    statusDiv.innerHTML = "Erro na validação";
    statusDiv.className = "status invalido";

    dadosDiv.innerHTML = `<p>${err.message}</p>`;
  }
}

validar();
</script>
