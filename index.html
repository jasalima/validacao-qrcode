<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Autenticidade de Documento</title>

<style>
body { font-family: Arial; background:#f4f6f8; margin:0; }

.header { background:#0b5fa5; color:#fff; padding:20px; }

.container {
  background:#fff;
  max-width:900px;
  margin:30px auto;
  padding:25px;
  border-radius:8px;
}

.status {
  padding:15px;
  font-weight:bold;
  margin-bottom:20px;
  border-radius:5px;
}

.valido {
  background:#e6f4ea;
  color:#137333;
  border:1px solid #34a853;
}

.invalido {
  background:#fdecea;
  color:#c5221f;
  border:1px solid #ea4335;
}

.selo {
  border:2px solid #137333;
  padding:15px;
  border-radius:8px;
  margin-top:20px;
  background:#f0fff4;
}

.codigo-box {
  background:#f1f3f4;
  padding:10px;
  border-radius:5px;
  font-family:monospace;
  margin-top:10px;
}

.footer {
  margin-top:25px;
  padding-top:15px;
  border-top:1px solid #ccc;
  border-bottom:1px solid #ccc;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.footer-text {
  font-size:12px;
  color:#555;
}

.footer img {
  width:120px;
}

a {
  color:#0b5fa5;
  text-decoration:underline;
}
</style>
</head>

<body>

<div class="header">
  <h2>MINISTÉRIO DA GESTÃO E INOVAÇÃO</h2>
  <div>Autenticidade de Documento</div>
</div>

<div class="container">
  <h3>Conferência de Autenticidade</h3>
  <div id="status" class="status">Validando...</div>
  <div id="dados"></div>
</div>

<script>
window.onload = async function () {

  const statusDiv = document.getElementById("status");
  const dadosDiv = document.getElementById("dados");

  const params = new URLSearchParams(window.location.search);
  const codigo = params.get("codigo");
  const hash = params.get("hash");

  function fData(v){
    if(!v || v === "-") return "-";
    const d = new Date(v);
    if(isNaN(d)) return v;
    const p=n=>n.toString().padStart(2,'0');
    return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
  }

  try{

    const res = await fetch(`/api/validar?codigo=${codigo}&hash=${hash}`);
    const data = await res.json();

    console.log("RETORNO API:", data);

    if(data.status !== "valido"){
      statusDiv.innerHTML = "❌ Documento inválido";
      statusDiv.className = "status invalido";
      return;
    }

    statusDiv.innerHTML = "✔ Documento Autêntico";
    statusDiv.className = "status valido";

    const payload = data.corpo || data;

const d = payload.dados || {};
const tipo = (payload.tipo || "").toLowerCase();

    let html = "";

    if(tipo === "fiscalizacao"){

      html = `
        <p><b>Fiscal do contrato:</b> ${d.AssinanteNome || "-"}</p>
        <p><b>Matrícula:</b> ${d.AssinanteMatricula || "-"}</p>
        <p><b>Status:</b> ${d.StatusGeral || "-"}</p>
      `;

    } else {

      html = `
        <p><b>Solicitante:</b> ${d.Solicitante || "-"}</p>
        <p><b>Status:</b> ${d.StatusGeral || "-"}</p>

        <p><b>Chefe do setor:</b> ${d.ChefeNome || "-"}</p>
        <p><b>Matrícula:</b> ${d.ChefeMatricula || "-"}</p>

        <hr>

        <p><b>Responsável transporte:</b> ${d.RespTransporte || "-"}</p>
        <p><b>Matrícula:</b> ${d.TransporteMatricula || "-"}</p>
        <p><b>Data aprovação:</b> ${fData(d.TransporteDataAprova)}</p>
      `;
    }

    dadosDiv.innerHTML = `
      ${html}

      <div class="selo">
        <strong>DOCUMENTO VALIDADO DIGITALMENTE</strong>

        <div style="margin-top:10px;">
          Código verificador:
          <div class="codigo-box">${codigo}</div>
        </div>

        <div>
          Hash de segurança:
          <div class="codigo-box">${hash.substring(0,10)}...</div>
        </div>
      </div>

      <div class="footer">
        <div class="footer-text">
          Este documento foi validado eletronicamente.
        </div>

        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${window.location.href}" />
      </div>
    `;

  }catch(e){

    console.error(e);

    statusDiv.innerHTML = "Erro na validação";
    statusDiv.className = "status invalido";

    dadosDiv.innerHTML = `<p>${e.message}</p>`;
  }

}
</script>

</body>
</html>
