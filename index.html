<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Autenticidade de Documento</title>

<style>
body { font-family: Arial; background:#f4f6f8; margin:0; }
.header { background:#0b5fa5; color:#fff; padding:20px; }
.container { background:#fff; max-width:900px; margin:30px auto; padding:25px; border-radius:8px; }
.status { padding:15px; font-weight:bold; margin-bottom:20px; border-radius:5px; }
.valido { background:#e6f4ea; color:#137333; border:1px solid #34a853; }
.invalido { background:#fdecea; color:#c5221f; border:1px solid #ea4335; }
.selo { border:2px solid #137333; padding:15px; border-radius:8px; margin-top:20px; background:#f0fff4; }
.codigo-box { background:#f1f3f4; padding:10px; border-radius:5px; font-family:monospace; margin-top:10px; }
.footer { margin-top:30px; font-size:12px; color:#555; }
</style>
</head>

<body>

<div class="header">
  <h2>MINISTÉRIO DA GESTÃO E INOVAÇÃO</h2>
  <div>Autenticidade de Documento</div>
</div>

<div class="container">
  <h3>Conferência de Autenticidade</h3>
  <div id="status" class="status">Validando...</div>
  <div id="dados"></div>
</div>

<script>
window.onload = function () {

  const statusDiv = document.getElementById("status");
  const dadosDiv = document.getElementById("dados");

  const params = new URLSearchParams(window.location.search);
  const codigo = params.get("codigo");
  const hash = params.get("hash");

  function fData(v){
    if(!v) return "-";
    const d = new Date(v);
    if(isNaN(d)) return v;
    const p=n=>n.toString().padStart(2,'0');
    return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
  }

  function curto(v){
    if(!v) return "-";
    return v.substring(0,10)+"...";
  }

  function g(o, campos){
    for(let c of campos){
      if(o && o[c]) return o[c];
    }
    return "-";
  }

  async function validar(){

    try{

      const res = await fetch(`/api/validar?codigo=${codigo}&hash=${hash}`);
      let data = await res.json();

      console.log("RAW:", data);

      // 🔥 TRATAMENTO UNIVERSAL
      if(data.body){
        data = data.body;
      }

      // 🔥 CASO VENHA STRING (Power Automate comum)
      if(typeof data === "string"){
        try{
          data = JSON.parse(data);
        }catch(e){
          console.error("Erro parse:", e);
        }
      }

      // 🔥 CASO VENHA EM detalhe
      if(data.detalhe){
        try{
          data = JSON.parse(data.detalhe);
        }catch(e){}
      }

      console.log("NORMALIZADO:", data);

      if(data.status !== "valido"){
        statusDiv.innerHTML="❌ Documento inválido";
        statusDiv.className="status invalido";
        return;
      }

      statusDiv.innerHTML="✔ Documento Autêntico";
      statusDiv.className="status valido";

      const d = data.dados || {};
      const tipo = (data.tipo || "").toLowerCase();

      let html="";

      if(tipo === "fiscalizacao"){

        html = `
          <p><b>Fiscal:</b> ${g(d,["AssinanteNome"])}</p>
          <p><b>Matrícula:</b> ${g(d,["AssinanteMatricula"])}</p>
          <p><b>Data/Hora:</b> ${fData(g(d,["DataHoraAssinatura"]))}</p>
        `;
      }

      else if(tipo === "transporte" || tipo === "reserva"){

        html = `
          <p><b>Solicitante:</b> ${g(d,["Solicitante"])}</p>

          <p><b>Chefe do setor:</b> ${g(d,["ChefeNome"])}</p>
          <p><b>Matrícula:</b> ${g(d,["ChefeMatricula"])}</p>
          <p><b>Data aprovação:</b> ${fData(g(d,["ChefeDataHoraAprovacao"]))}</p>

          <hr>

          <p><b>Responsável transporte:</b> ${g(d,["RespTransporte"])}</p>
          <p><b>Matrícula:</b> ${g(d,["TransporteMatricula"])}</p>
          <p><b>Data aprovação:</b> ${fData(g(d,["TransporteDataAprova"]))}</p>
        `;
      }

      else{
        html = `<p><b>Tipo não reconhecido:</b> ${tipo}</p>`;
      }

      dadosDiv.innerHTML = `
        ${html}

        <div class="selo">
          <strong>DOCUMENTO VALIDADO DIGITALMENTE</strong>

          Código verificador:
          <div class="codigo-box">${codigo}</div>

          Hash de segurança:
          <div class="codigo-box">${curto(hash)}</div>
        </div>

        <div style="margin-top:20px;">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${window.location.href}" />
        </div>

        <div class="footer">
          Este documento foi validado eletronicamente.
        </div>
      `;

    }catch(e){

      console.error(e);

      statusDiv.innerHTML="Erro na validação";
      statusDiv.className="status invalido";

      dadosDiv.innerHTML=`<p>${e.message}</p>`;
    }
  }

  validar();
}
</script>

</body>
</html>
