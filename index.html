<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Conferência de Autenticidade de Documento</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  margin: 0;
}

.header {
  background: #0b5fa5;
  color: white;
  padding: 20px;
}

.header h1 {
  margin: 0;
  font-size: 20px;
}

.container {
  background: white;
  max-width: 900px;
  margin: 30px auto;
  padding: 25px;
  border-radius: 5px;
}

.title {
  font-size: 22px;
  margin-bottom: 20px;
}

.status {
  padding: 15px;
  font-weight: bold;
  margin-bottom: 20px;
}

.valido {
  background: #e6f4ea;
  color: #137333;
  border: 1px solid #34a853;
}

.invalido {
  background: #fdecea;
  color: #c5221f;
  border: 1px solid #ea4335;
}

.dados {
  border-top: 1px solid #ddd;
  padding-top: 15px;
}

.dados p {
  margin: 6px 0;
}

.qrcode {
  margin-top: 20px;
}

.footer {
  margin-top: 30px;
  font-size: 12px;
  color: #555;
}
</style>
</head>

<body>

<div class="header">
  <h1>MINISTÉRIO DA GESTÃO E DA INOVAÇÃO EM SERVIÇOS PÚBLICOS</h1>
  <div>Secretaria do Patrimônio da União</div>
  <div>Superintendência do Patrimônio da União no Tocantins</div>
</div>

<div class="container">

  <div class="title">Conferência de Autenticidade de Documento</div>

  <div id="status" class="status">Validando...</div>

  <div id="dados" class="dados"></div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const codigo = params.get("codigo");
const hash = params.get("hash");

async function validar() {
  try {

    if (!codigo || !hash) {
      document.getElementById("status").innerHTML = "Parâmetros inválidos";
      document.getElementById("status").className = "status invalido";
      return;
    }

    const res = await fetch(`/api/validar?codigo=${codigo}&hash=${hash}`);

    // 🔥 Blindagem contra erro HTML
    const text = await res.text();
    console.log("Resposta bruta:", text);

    let data;
    try {
      data = JSON.parse(text);
    } catch (e) {
      throw new Error("Resposta não é JSON válida");
    }

    const statusDiv = document.getElementById("status");
    const dadosDiv = document.getElementById("dados");

    if (data.status === "valido") {

      statusDiv.innerHTML = "✔ Documento válido";
      statusDiv.className = "status valido";

      const d = data.dados || {};

      // 🔹 Função de formatação de data
      const formatarData = (dataRaw) => {
  if (!dataRaw || dataRaw === '-') return '-';

  const data = new Date(dataRaw);
  if (isNaN(data)) return dataRaw;

  const pad = (n) => n.toString().padStart(2, '0');

  const dia = pad(data.getDate());
  const mes = pad(data.getMonth() + 1);
  const ano = data.getFullYear();
  const hora = pad(data.getHours());
  const min = pad(data.getMinutes());

  return `${dia}/${mes}/${ano} ${hora}:${min}`;
};

      const dataFormatada = formatarData(d.TransporteDataAprova);
      const dataChefia = formatarData(d.ChefeDataHoraAprovacao);

      dadosDiv.innerHTML = `
        <p><b>Solicitante:</b> ${d.Solicitante || '-'}</p>
        <p><b>Status:</b> ${d.StatusGeral || '-'} em ${dataFormatada}</p>
        <p><b>Chefe do Setor:</b> ${d.ChefeNome || '-'} - Aprovado em ${dataChefia}</p>
        <p><b>Matrícula:</b> ${d.ChefeMatrícula || '-'}</p>
        <p><b>Setor de Transportes:</b> ${d.RespTransporte || '-'}</p>
        <p><b>Matrícula:</b> ${d.TransporteMatricula || '-'}</p>
        <p><b>Data/Hora:</b> ${dataFormatada}</p>
        <p><b>Código verificador:</b> ${codigo}</p>
        <p><b>Hash:</b> ${hash}</p>

        <div class="qrcode">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${window.location.href}" />
        </div>

        <div class="footer">
          A autenticidade deste documento pode ser conferida no sistema de gestão de frotas,
          informando o código verificador e o hash de segurança.
        </div>
      `;

    } else {

      statusDiv.innerHTML = "❌ Documento inválido ou não encontrado";
      statusDiv.className = "status invalido";

      dadosDiv.innerHTML = `
        <p>O código informado não corresponde a um documento válido.</p>
      `;
    }

  } catch (err) {
    console.error(err);

    document.getElementById("status").innerHTML = "Erro ao validar documento";
    document.getElementById("status").className = "status invalido";

    document.getElementById("dados").innerHTML = `
      <p><b>Detalhe técnico:</b> ${err.message}</p>
    `;
  }
}

validar();
</script>

</body>
</html>
