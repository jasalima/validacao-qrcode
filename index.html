<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Autenticidade de Documento</title>

<style>
body {
  font-family: "Segoe UI", Arial;
  background:#e9ecef;
  margin:0;
}

.header {
  background:#0b5fa5;
  color:#fff;
  padding:20px;
  text-align:center;
  letter-spacing:1px;
}

.container {
  background:#fff;
  max-width:850px;
  margin:30px auto;
  padding:30px;
  border-radius:6px;
  box-shadow:0 0 10px rgba(0,0,0,0.08);
  border:1px solid #dcdcdc;
}

h3 {
  margin-top:0;
}

.status {
  padding:14px;
  font-weight:bold;
  margin-bottom:25px;
  border-radius:4px;
  font-size:15px;
}

.valido {
  background:#e6f4ea;
  color:#137333;
  border:1px solid #34a853;
}

.invalido {
  background:#fdecea;
  color:#c5221f;
  border:1px solid #ea4335;
}

.bloco {
  margin-bottom:20px;
}

.linha {
  margin:6px 0;
  font-size:15px;
}

.linha b {
  display:inline-block;
  width:200px;
  color:#333;
}

.divisor {
  border-top:1px solid #ddd;
  margin:20px 0;
}

.selo {
  border:2px solid #137333;
  padding:18px;
  border-radius:6px;
  background:#f3fff6;
  margin-top:20px;
}

.codigo-box {
  background:#f1f3f4;
  padding:10px;
  border-radius:4px;
  font-family:monospace;
  margin-top:6px;
}

.footer {
  margin-top:25px;
  border-top:1px solid #ccc;
  border-bottom:1px solid #ccc;
  padding:15px 0;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.footer-text {
  font-size:12px;
  color:#555;
}

.qr-box {
  border:1px solid #ccc;
  padding:10px;
  border-radius:6px;
  background:#fff;
}

.qr-box img {
  width:110px;
}

a {
  color:#0b5fa5;
  text-decoration:underline;
}
</style>
</head>

<body>

<div class="header">
  <h2>MINISTÉRIO DA GESTÃO E INOVAÇÃO</h2>
  <div>VALIDAÇÃO DE DOCUMENTO</div>
</div>

<div class="container">
  <h3>Conferência de Autenticidade</h3>
  <div id="status" class="status">Validando...</div>
  <div id="dados"></div>
</div>

<script>
window.onload = async function () {

  const statusDiv = document.getElementById("status");
  const dadosDiv = document.getElementById("dados");

  const params = new URLSearchParams(window.location.search);
  const codigo = params.get("codigo");
  const hash = params.get("hash");

  function fData(v){
    if(!v || v === "-") return "-";
    const d = new Date(v);
    if(isNaN(d)) return v;
    const p=n=>n.toString().padStart(2,'0');
    return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
  }

  try{

    const res = await fetch(`/api/validar?codigo=${codigo}&hash=${hash}`);
    const data = await res.json();

    const payload = data.corpo || data;
    const d = payload.dados || {};
    const tipo = (payload.tipo || "").toLowerCase();

    if(payload.status !== "valido"){
      statusDiv.innerHTML = "❌ Documento inválido";
      statusDiv.className = "status invalido";
      return;
    }

    statusDiv.innerHTML = "✔ Documento Autêntico";
    statusDiv.className = "status valido";

    let html = "";

    if(tipo === "fiscalizacao"){

      html = `
        <div class="bloco">
          <div class="linha"><b>Fiscal do contrato:</b> ${d.AssinanteNome || "-"}</div>
          <div class="linha"><b>Matrícula:</b> ${d.AssinanteMatricula || "-"}</div>
          <div class="linha"><b>Status:</b> ${d.StatusGeral || "-"}</div>
        </div>
      `;

    } else {

      html = `
        <div class="bloco">
          <div class="linha"><b>Solicitante:</b> ${d.Solicitante || "-"}</div>
          <div class="linha"><b>Status:</b> ${d.StatusGeral || "-"}</div>
          <div class="linha"><b>Chefe do setor:</b> ${d.ChefeNome || "-"}</div>
          <div class="linha"><b>Matrícula:</b> ${d.ChefeMatricula || "-"}</div>
        </div>

        <div class="divisor"></div>

        <div class="bloco">
          <div class="linha"><b>Responsável transporte:</b> ${d.RespTransporte || "-"}</div>
          <div class="linha"><b>Matrícula:</b> ${d.TransporteMatricula || "-"}</div>
          <div class="linha"><b>Data aprovação:</b> ${fData(d.TransporteDataAprova)}</div>
        </div>
      `;
    }

    dadosDiv.innerHTML = `
      ${html}

      <div class="selo">
        <strong>DOCUMENTO VALIDADO DIGITALMENTE</strong>

        <div style="margin-top:10px;">
          Código verificador:
          <div class="codigo-box">${codigo}</div>
        </div>

        <div>
          Hash de segurança:
          <div class="codigo-box">${hash.substring(0,10)}...</div>
        </div>
      </div>

      <div class="footer">
        <div class="footer-text">
          Este documento foi validado eletronicamente.
        </div>

        <div class="qr-box">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${window.location.href}" />
        </div>
      </div>
    `;

  }catch(e){

    statusDiv.innerHTML = "Erro na validação";
    statusDiv.className = "status invalido";

    dadosDiv.innerHTML = `<p>${e.message}</p>`;
  }

}
</script>

</body>
</html>
