<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Autenticidade de Documento</title>

<style>
body { font-family: Arial; background:#f4f6f8; margin:0; }
.header { background:#0b5fa5; color:#fff; padding:20px; }
.container { background:#fff; max-width:900px; margin:30px auto; padding:25px; border-radius:8px; }
.status { padding:15px; font-weight:bold; margin-bottom:20px; border-radius:5px; }
.valido { background:#e6f4ea; color:#137333; border:1px solid #34a853; }
.invalido { background:#fdecea; color:#c5221f; border:1px solid #ea4335; }
.selo { border:2px solid #137333; padding:15px; border-radius:8px; margin-top:20px; background:#f0fff4; }
.codigo-box { background:#f1f3f4; padding:10px; border-radius:5px; font-family:monospace; margin-top:10px; }
.footer { margin-top:30px; font-size:12px; color:#555; }
</style>
</head>

<body>

<div class="header">
  <h2>MINISTÉRIO DA GESTÃO E INOVAÇÃO</h2>
  <div>Autenticidade de Documento</div>
</div>

<div class="container">
  <h3>Conferência de Autenticidade</h3>
  <div id="status" class="status">Validando...</div>
  <div id="dados"></div>
</div>

<script>
window.onload = async function () {

  const statusDiv = document.getElementById("status");
  const dadosDiv = document.getElementById("dados");

  const params = new URLSearchParams(window.location.search);
  const codigo = params.get("codigo");
  const hash = params.get("hash");

  function fData(v){
    if(!v) return "-";
    const d = new Date(v);
    if(isNaN(d)) return v;
    const p=n=>n.toString().padStart(2,'0');
    return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
  }

  try{

    const res = await fetch(`/api/validar?codigo=${codigo}&hash=${hash}`);
    const data = await res.json();

    console.log("RETORNO API:", data);

    if(data.status !== "valido"){
      statusDiv.innerHTML = "❌ Documento inválido";
      statusDiv.className = "status invalido";
      return;
    }

    statusDiv.innerHTML = "✔ Documento Autêntico";
    statusDiv.className = "status valido";

    const d = data.dados || {};
    const tipo = (d.tipo || "").toLowerCase();

    let html = "";

    // =========================
    // FISCALIZAÇÃO
    // =========================
    if(tipo === "fiscalizacao"){

      html = `
        <p><b>Fiscal:</b> ${d.fiscalContrato || "-"}</p>
        <p><b>Matrícula:</b> ${d.matricula || "-"}</p>
        <p><b>Data/Hora:</b> ${fData(d.dataHoraAtesto)}</p>
      `;

    }

    // =========================
    // RESERVA / TRANSPORTE
    // =========================
    else{

      html = `
        <p><b>Solicitante:</b> ${d.solicitante || "-"}</p>
        <p><b>Status:</b> ${d.status || "-"}</p>

        <p><b>Chefe do setor:</b> ${d.chefeSetor || "-"}</p>
        <p><b>Matrícula:</b> ${d.matricula || "-"}</p>

        <hr>

        <p><b>Responsável transporte:</b> ${d.setor || "-"}</p>
        <p><b>Data aprovação:</b> ${fData(d.dataHora)}</p>
      `;
    }

    dadosDiv.innerHTML = `
      ${html}

      <div class="selo">
        <strong>DOCUMENTO VALIDADO DIGITALMENTE</strong>

        Código verificador:
        <div class="codigo-box">${codigo}</div>

        Hash de segurança:
        <div class="codigo-box">${hash.substring(0,10)}...</div>
      </div>

      <div style="margin-top:20px;">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${window.location.href}" />
      </div>

      <div class="footer">
        Este documento foi validado eletronicamente.
      </div>
    `;

  }catch(e){

    console.error(e);

    statusDiv.innerHTML = "Erro na validação";
    statusDiv.className = "status invalido";

    dadosDiv.innerHTML = `<p>${e.message}</p>`;
  }

}
</script>

</body>
</html>
