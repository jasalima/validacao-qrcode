<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Autenticidade de Documento</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
}

.header {
  background: #0b5fa5;
  color: white;
  padding: 20px;
}

.container {
  background: white;
  max-width: 900px;
  margin: 30px auto;
  padding: 25px;
  border-radius: 8px;
}

.title {
  font-size: 22px;
  margin-bottom: 20px;
}

.status {
  padding: 15px;
  font-weight: bold;
  margin-bottom: 20px;
  border-radius: 5px;
}

.valido {
  background: #e6f4ea;
  color: #137333;
  border: 1px solid #34a853;
}

.invalido {
  background: #fdecea;
  color: #c5221f;
  border: 1px solid #ea4335;
}

.selo {
  border: 2px solid #137333;
  padding: 15px;
  border-radius: 8px;
  margin-top: 20px;
  background: #f0fff4;
}

.selo strong {
  display: block;
  font-size: 16px;
  color: #137333;
}

.dados p {
  margin: 6px 0;
}

.codigo-box {
  background: #f1f3f4;
  padding: 10px;
  border-radius: 5px;
  font-family: monospace;
  margin-top: 10px;
}

.footer {
  margin-top: 30px;
  font-size: 12px;
  color: #555;
}

hr {
  border: 0;
  border-top: 1px solid #ddd;
  margin: 12px 0;
}
</style>
</head>

<body>

<div class="header">
  <h2>MINISTÉRIO DA GESTÃO E INOVAÇÃO</h2>
  <div>Autenticidade de Documento</div>
</div>

<div class="container">

  <div class="title">Conferência de Autenticidade</div>

  <div id="status" class="status">Validando...</div>

  <div id="dados" class="dados"></div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const codigo = params.get("codigo");
const hash = params.get("hash");

function formatarData(dataRaw) {
  if (!dataRaw) return "-";
  const d = new Date(dataRaw);
  if (isNaN(d)) return dataRaw;

  const pad = (n) => n.toString().padStart(2, '0');

  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function hashCurto(hash) {
  if (!hash) return "-";
  return hash.substring(0, 10) + "...";
}

async function validar() {

  const statusDiv = document.getElementById("status");
  const dadosDiv = document.getElementById("dados");

  if (!codigo || !hash) {
    statusDiv.innerHTML = "Parâmetros inválidos";
    statusDiv.className = "status invalido";
    return;
  }

  try {

    const res = await fetch(`/api/validar?codigo=${codigo}&hash=${hash}`);
    const data = await res.json();

    if (data.status === "valido") {

      statusDiv.innerHTML = "✔ Documento Autêntico";
      statusDiv.className = "status valido";

      const d = data.dados;
      const tipo = (data.tipo || "").toLowerCase();

      let html = "";

      // =========================
      // 📄 FISCALIZAÇÃO
      // =========================
      if (tipo === "fiscalizacao") {

        html = `
          <p><b>Fiscal do contrato:</b> ${d.AssinanteNome || '-'}</p>
          <p><b>Matrícula:</b> ${d.AssinanteMatricula || '-'}</p>
          <p><b>Data/hora do atesto:</b> ${formatarData(d.DataHoraAssinatura)}</p>
        `;

      // =========================
      // 🚗 TRANSPORTE
      // =========================
      } else if (tipo === "transporte") {

        html = `
          <p><b>Solicitante:</b> ${d.Solicitante || '-'}</p>

          <hr>

          <p><b>Chefe do Setor:</b> ${d.ChefeNome || '-'}</p>
          <p><b>Matrícula:</b> ${d.ChefeMatricula || '-'}</p>
          <p><b>Data/Hora da aprovação:</b> ${formatarData(d.DataHoraAssinatura)}</p>

          <hr>

          <p><b>Responsável pelo Transporte:</b> ${d.RespTransporte || '-'}</p>
          <p><b>Matrícula:</b> ${d.TransporteMatricula || '-'}</p>
          <p><b>Data/Hora da aprovação:</b> ${formatarData(d.TransporteDataAprova)}</p>

          <hr>

          <p><b>Status:</b> ${d.StatusGeral || '-'}</p>
        `;

      // =========================
      // 🔄 GENÉRICO
      // =========================
      } else {

        html = `
          <p><b>Documento identificado, porém sem layout específico.</b></p>
        `;
      }

      dadosDiv.innerHTML = `
        ${html}

        <div class="selo">
          <strong>DOCUMENTO VALIDADO DIGITALMENTE</strong>
          Código verificador:
          <div class="codigo-box">${codigo}</div>

          Hash de segurança:
          <div class="codigo-box">${hashCurto(hash)}</div>
        </div>

        <div style="margin-top:20px;">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${window.location.href}" />
        </div>

        <div class="footer">
          Este documento foi validado eletronicamente e pode ser conferido a qualquer momento utilizando o código verificador.
        </div>
      `;

    } else {

      statusDiv.innerHTML = "❌ Documento inválido";
      statusDiv.className = "status invalido";

      dadosDiv.innerHTML = `<p>Documento não encontrado ou inválido.</p>`;
    }

  } catch (err) {

    statusDiv.innerHTML = "Erro na validação";
    statusDiv.className = "status invalido";

    dadosDiv.innerHTML = `<p>${err.message}</p>`;
  }
}

validar();
</script>

</body>
</html>
